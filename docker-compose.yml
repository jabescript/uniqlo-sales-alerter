services:
  uniqlo-alerter:
    image: kequach/uniqlo-sales-alerter:latest
    container_name: uniqlo-alerter
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - alerter-state:/app/data
    environment:
      - STATE_FILE=/app/data/.seen_variants.json

volumes:
  alerter-state:
