# ── General ────────────────────────────────────────────────────
uniqlo:
  # Country/language for the Uniqlo API.
  # Full support:    "de/de", "uk/en", "fr/fr", "es/es", "it/it",
  #                  "be/fr", "be/nl", "nl/nl", "dk/en", "se/en",
  #                  "au/en", "in/en", "id/en", "vn/vi", "ph/en",
  #                  "my/en", "th/en"
  # Limited support: "us/en", "ca/en", "jp/ja", "kr/ko", "sg/en"
  #   Limited countries show sale-flagged items but can't calculate
  #   discount percentages; min_sale_percentage is ignored.
  country: "de/de"

  # How often to poll the Uniqlo API (in minutes).
  # Respects quiet hours.  Set to 0 to disable periodic checks.
  check_interval_minutes: 30

  # Fixed daily check times (24-hour HH:MM, local time).
  # Not affected by quiet hours.  Both modes can be used together.
  scheduled_checks: []

  # Sale category path IDs (required for Singapore, optional elsewhere).
  # Find yours in the sale-page URL: .../feature/sale/men?path=5856
  # Singapore paths (as of 2026): ["5855", "5856", "5857", "5858"]
  sale_paths: []

# ── Scheduling ─────────────────────────────────────────────────
quiet_hours:
  # Suppress periodic checks during this daily window.
  # Times are 24-hour HH:MM, local time.  May cross midnight.
  enabled: false
  start: "01:00"
  end: "08:00"

# ── Filters ────────────────────────────────────────────────────
filters:
  # Which genders to include.  Valid: men, women, unisex, kids, baby
  gender:
  - MEN
  - WOMEN
  - UNISEX

  # Minimum discount to surface a deal (ignored for limited countries).
  min_sale_percentage: 50.0

  # Size filters — only items with at least one matching in-stock size.
  # Omit or leave empty to skip filtering for that category.
  #   Clothing: XXS, XS, S, M, L, XL, XXL, 3XL
  #   Pants:    22inch – 40inch
  #   Shoes:    37 – 43 (half sizes supported)
  #   One Size: bags, hats, accessories
  sizes:
    clothing:
    - M
    pants:
    - 30inch
    - 31inch
    - 32inch
    shoes:
    - '42'
    - '42.5'
    one_size: true

  # ── Watched & Ignored ─────────────────────────────────────────
  # Watched variants: specific colour+size combos to always monitor,
  # even when not on sale.  Paste a Uniqlo product URL — metadata is
  # resolved from the API on startup.
  watched_variants:
  - url: 
      https://www.uniqlo.com/de/de/products/E483045-000/00?colorDisplayCode=70&sizeDisplayCode=003
    id: E483045-000
    price_group: '00'
    name: Satin Rock (lang)
    color: '70'
    color_name: HELLES LILA
    size: '003'
    size_name: S
  - url: 
      https://www.uniqlo.com/de/de/products/E483049-000/00?colorDisplayCode=39&sizeDisplayCode=004
    id: E483049-000
    price_group: '00'
    name: Satin Bluse (oversized, kurz, Halbarm)
    color: '39'
    color_name: DUNKELBRAUN
    size: '004'
    size_name: M

  # Ignored products: hidden from all results regardless of sale/size.
  # Watched variants take precedence over ignored products.
  ignored_products:
  - id: E481518-000
    url: https://www.uniqlo.com/de/de/products/E481518-000/00
    name: Bundfaltenhose (Wide Fit, Jersey Velours, lang)
  - id: E485255-000
    url: https://www.uniqlo.com/de/de/products/E485255-000/00
    name: ZOOTROPOLIS UT T-Shirt

# ── Server URL ─────────────────────────────────────────────────
# Enables Ignore / Watch / Unwatch action buttons in notifications.
# Set to the address other devices can reach, e.g. "http://192.168.1.50".
# The port is appended automatically.  Leave empty to hide buttons.
server_url: "http://localhost"
port: 8000

# ── Notifications ──────────────────────────────────────────────
notifications:
  # Notification mode:
  #   "all_then_new" — all deals on first check, then only changes (default)
  #   "new_deals"    — only unseen variants (state persists across restarts)
  #   "every_check"  — all matching deals every time
  notify_on: all_then_new

  # Run a sale check immediately on server startup.
  check_on_startup: true

  # Preview modes — local previews alongside real channels.
  # Also available via CLI: --preview-cli / --preview-html
  preview_cli: false
  preview_html: true

  # ── Notification Triggers ───────────────────────────────────
  # A variant is labelled "low stock" when its remaining quantity
  # is at or below this number.  Set to 0 to disable the numeric
  # check and fall back to the Uniqlo API's own LOW_STOCK flag
  # (whose threshold is undocumented).  When >0, this setting is
  # authoritative and overrides the API's flag.
  low_stock_threshold: 3

  # When true, variants that are currently low stock are kept out
  # of the seen-set, so you only get alerted once they climb back
  # above the threshold.  Useful to avoid being pinged for an OOS
  # item that restocks with only 2 units (when threshold is 3).
  # Low-stock sizes still appear inside existing notifications so
  # you can see the full state of a deal.
  suppress_low_stock_alerts: false

  channels:
    telegram:
      enabled: false
      bot_token: ""
      chat_id: ""

    email:
      enabled: false
      smtp_host: "smtp.gmail.com"
      smtp_port: 587
      use_tls: true
      smtp_user: ""
      smtp_password: ""
      from_address: ""
      to_addresses: []
